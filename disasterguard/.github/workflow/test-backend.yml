name: Test Backend

on:
  push:
    branches: [main]
    paths:
      - 'disasterguard/backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: disasterguard/backend/package-lock.json

      - name: Install dependencies
        working-directory: disasterguard/backend
        run: npm install

      - name: Check for syntax errors
        working-directory: disasterguard/backend
        run: node --check server.js

      - name: Verify all service files load
        working-directory: disasterguard/backend
        run: |
          node --check services/weatherPoller.js
          node --check services/riskClassifier.js
          node --check services/resourceMatcher.js
          node --check services/notifier.js
          node --check routes/alerts.js
          node --check routes/resources.js
          node --check routes/stream.js

      - name: Check health endpoint structure
        working-directory: disasterguard/backend
        run: |
          echo " Backend syntax check passed"
          echo " All service files valid"
          echo " All route files valid"

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "Backend tests passed — safe to deploy"
          else
            echo " Backend tests failed — check syntax errors"
            exit 1
          fi